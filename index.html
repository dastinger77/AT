<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drewno & Stal | Warsztat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* =========================================================
           1. MODUŁ: GÓRNY PASEK (HEADER & NAV)
           ========================================================= */
        
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            z-index: 1000;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            justify-content: center; /* Trzyma logo w centrum */
        }
        header.visible { opacity: 1; }

        /* Kontener marki (Logo + Tel) */
        #brand-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2000;
            transition: all 1.5s cubic-bezier(0.85, 0, 0.15, 1);
            width: auto;
            text-align: center;
        }

        .logo-wrapper { display: flex; align-items: center; gap: 25px; transition: gap 1.5s ease; }
        #logo-icon { width: 70px; height: auto; fill: #fff; transition: all 1.5s ease; }
        #main-logo { font-size: clamp(2rem, 8vw, 5rem); font-weight: 900; letter-spacing: 12px; text-transform: uppercase; transition: all 1.5s ease; }
        #phone-number { font-size: 1.1rem; letter-spacing: 3px; margin-top: 15px; opacity: 0; color: #d4af37; transition: opacity 1s ease; }
        #phone-number a { color: inherit; text-decoration: none; }

        /* Stylizacja po przeniesieniu do góry */
        #brand-container.moved-to-header { top: 50px; }
        #brand-container.moved-to-header #logo-icon { width: 32px; fill: #d4af37; }
        #brand-container.moved-to-header #main-logo { font-size: 1.3rem; letter-spacing: 5px; color: #d4af37; }
        #brand-container.moved-to-header #phone-number { opacity: 1; font-size: 0.85rem; margin-top: 2px; }

        /* --- NOWOŚĆ: MENU W PRAWYM NAROŻNIKU --- */
        .nav-container {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 3000;
            opacity: 0;
            transition: opacity 1s ease 3.5s; /* Pojawia się dopiero po animacji logo */
        }
        header.visible .nav-container { opacity: 1; }

        .menu-btn {
            background: none;
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #d4af37;
            padding: 10px 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        .menu-btn:hover { background: #d4af37; color: #000; }

        /* Rozwijana lista */
        .dropdown-content {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.2);
            min-width: 200px;
            display: none; /* Ukryte */
            flex-direction: column;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown-content.show { display: flex; animation: fadeIn 0.3s ease; }

        .dropdown-content a {
            color: #fff;
            padding: 15px 25px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.3s;
        }
        .dropdown-content a:hover { background: rgba(212, 175, 55, 0.1); color: #d4af37; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================================
           KONIEC MODUŁU GÓRNEGO PASKA
           ========================================================= */

        /* SEKCCJE STRONY */
        section { height: 100vh; width: 100%; position: sticky; top: 0; display: flex; align-items: center; justify-content: center; scroll-snap-align: start; overflow: hidden; background: #0a0a0a; }
        .hero { opacity: 0; transition: opacity 1.5s ease; }
        .hero.visible { opacity: 1; }
        .hero h1 { font-size: clamp(1.2rem, 4vw, 2.5rem); font-style: italic; font-weight: 300; text-align: center; }
        .bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); transition: all 0.8s ease; }
        .shrink { transform: scale(0.95); filter: brightness(0.15) blur(5px); }
        .content { position: relative; z-index: 10; text-align: center; }
    </style>
</head>
<body>

    <header id="top-bar">
        <div class="nav-container">
            <button class="menu-btn" onclick="toggleMenu()">Menu</button>
            <div id="myDropdown" class="dropdown-content">
                <a href="#galeria">Galeria</a>
                <a href="#kontakt">Kontakt</a>
            </div>
        </div>
    </header>

    <div id="brand-container">
        <div class="logo-wrapper">
            <svg id="logo-icon" viewBox="0 0 100 100">
                <rect x="20" y="20" width="60" height="8" />
                <rect x="20" y="46" width="60" height="8" />
                <rect x="20" y="72" width="60" height="8" />
                <rect x="46" y="10" width="8" height="80" />
            </svg>
            <div id="main-logo">Drewno&Stal</div>
        </div>
        <div id="phone-number">
            <a href="tel:+48111222333">+48 111 222 333</a>
        </div>
    </div>

    <section class="hero" id="motto-section">
        <div class="content"><h1>"Razem zbudujemy przestrzeń dla Twojego życia"</h1></div>
    </section>

    <section id="galeria" style="z-index: 2;">
        <img src="https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&w=1200&q=80" class="bg-img">
        <div class="content"><h2>REALIZACJA 01</h2></div>
    </section>

    <section id="kontakt" style="z-index: 10;">
        <div class="content">
            <h2 style="font-size: 3rem; margin-bottom: 20px;">KONTAKT</h2>
            <p>Porozmawiajmy o Twoim projekcie</p>
        </div>
    </section>

    <script>
        // Logika menu
        function toggleMenu() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Zamknij menu jeśli użytkownik kliknie poza nie
        window.onclick = function(event) {
            if (!event.target.matches('.menu-btn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }

        // Sekwencja startowa
        const brand = document.getElementById('brand-container');
        const header = document.getElementById('top-bar');
        const motto = document.getElementById('motto-section');

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                brand.classList.add('moved-to-header');
                header.classList.add('visible');
            }, 3000);

            setTimeout(() => motto.classList.add('visible'), 5000);
            setTimeout(() => { document.body.style.overflow = "auto"; }, 7000);
        });

        // Efekt stacking cards
        window.addEventListener('scroll', () => {
            document.querySelectorAll('section').forEach((section) => {
                const rect = section.getBoundingClientRect();
                const img = section.querySelector('.bg-img');
                if (img) {
                    if (rect.top <= 0 && rect.bottom > 100) {
                        img.classList.add('shrink');
                    } else {
                        img.classList.remove('shrink');
                    }
                }
            });
        });
    </script>
</body>
</html>
