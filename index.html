<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drewno & Stal | Warsztat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        /* PODSTAWA */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; } /* Płynne przewijanie do sekcji */
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* =========================================================
           GÓRNY PASEK - WERSJA DOPRACOWANA
           ========================================================= */
        
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 90px;
            background: rgba(0, 0, 0, 0.4); /* Lżejsze tło dla elegancji */
            backdrop-filter: blur(20px); /* Mocniejszy blur */
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            opacity: 0;
            transition: opacity 1s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        header.visible { opacity: 1; }

        /* Logo i Telefon */
        #brand-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2000;
            transition: all 1.5s cubic-bezier(0.85, 0, 0.15, 1);
            text-align: center;
        }

        .logo-wrapper { display: flex; align-items: center; gap: 20px; transition: gap 1.5s ease; }
        #logo-icon { width: 60px; height: auto; fill: #fff; transition: all 1.5s ease; }
        #main-logo { font-size: clamp(1.8rem, 7vw, 5rem); font-weight: 900; letter-spacing: 15px; text-transform: uppercase; transition: all 1.5s ease; }
        #phone-number { font-size: 1rem; letter-spacing: 3px; margin-top: 15px; opacity: 0; color: #d4af37; transition: opacity 1s ease; }
        #phone-number a { color: inherit; text-decoration: none; }

        /* Header Active State */
        #brand-container.moved-to-header { top: 45px; }
        #brand-container.moved-to-header #logo-icon { width: 28px; fill: #d4af37; }
        #brand-container.moved-to-header #main-logo { font-size: 1.1rem; letter-spacing: 6px; color: #d4af37; }
        #brand-container.moved-to-header #phone-number { opacity: 1; font-size: 0.75rem; margin-top: 2px; }

        /* MENU HAMBURGER */
        .nav-trigger {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 3000;
            cursor: pointer;
            padding: 10px;
            opacity: 0;
            transition: opacity 1s ease 3.5s;
        }
        header.visible .nav-trigger { opacity: 1; }

        .hamburger {
            width: 25px;
            height: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 1px; /* Cienkie, eleganckie linie */
            background: #d4af37;
            transition: all 0.3s ease;
        }

        /* Animacja hamburgera do X */
        .nav-trigger.open .line1 { transform: translateY(6.5px) rotate(45deg); }
        .nav-trigger.open .line2 { opacity: 0; }
        .nav-trigger.open .line3 { transform: translateY(-6.5px) rotate(-45deg); }

        /* ROZWIJANA LISTA (Full Screen Overlay Style) */
        .nav-menu {
            position: fixed;
            top: 0;
            right: -100%; /* Ukryte za ekranem */
            width: 300px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            transition: right 0.5s cubic-bezier(0.77,0,0.175,1);
            z-index: 2500;
            border-left: 1px solid rgba(212, 175, 55, 0.2);
        }
        .nav-menu.active { right: 0; }

        .nav-menu a {
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 20px 0;
            font-weight: 300;
            transition: color 0.3s;
        }
        .nav-menu a:hover { color: #d4af37; }

        /* =========================================================
           KONIEC GÓRNEGO PASKA
           ========================================================= */

        section { height: 100vh; width: 100%; position: sticky; top: 0; display: flex; align-items: center; justify-content: center; scroll-snap-align: start; overflow: hidden; background: #0a0a0a; }
        .hero { opacity: 0; transition: opacity 1.5s ease; }
        .hero.visible { opacity: 1; }
        .bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); transition: all 0.8s ease; }
        .shrink { transform: scale(0.95); filter: brightness(0.15) blur(5px); }
        .content { position: relative; z-index: 10; text-align: center; }
        h2 { font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 300; letter-spacing: 10px; }
    </style>
</head>
<body>

    <header id="top-bar">
        <div class="nav-trigger" onclick="toggleMenu()">
            <div class="hamburger">
                <span class="line1"></span>
                <span class="line2"></span>
                <span class="line3"></span>
            </div>
        </div>
    </header>

    <nav class="nav-menu" id="side-menu">
        <a href="#hero" onclick="toggleMenu()">Start</a>
        <a href="#galeria" onclick="toggleMenu()">Galeria</a>
        <a href="#kontakt" onclick="toggleMenu()">Kontakt</a>
    </nav>

    <div id="brand-container">
        <div class="logo-wrapper">
            <svg id="logo-icon" viewBox="0 0 100 100">
                <rect x="20" y="20" width="60" height="6" />
                <rect x="20" y="47" width="60" height="6" />
                <rect x="20" y="74" width="60" height="6" />
                <rect x="47" y="10" width="6" height="80" />
            </svg>
            <div id="main-logo">Drewno&Stal</div>
        </div>
        <div id="phone-number">
            <a href="tel:+48111222333">+48 111 222 333</a>
        </div>
    </div>

    <section class="hero" id="hero">
        <div class="content"><h1>"Razem zbudujemy przestrzeń dla Twojego życia"</h1></div>
    </section>

    <section id="galeria" style="z-index: 2;">
        <img src="https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&w=1200&q=80" class="bg-img">
        <div class="content"><h2>PROJEKTY</h2></div>
    </section>

    <section id="kontakt" style="z-index: 10;">
        <div class="content">
            <h2>KONTAKT</h2>
            <p style="margin-top: 20px; color: #888;">biuro@drewnostal.pl</p>
        </div>
    </section>

    <script>
        // Logika Menu
        function toggleMenu() {
            document.querySelector('.nav-trigger').classList.toggle('open');
            document.getElementById('side-menu').classList.toggle('active');
        }

        // Sekwencja startowa
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('brand-container').classList.add('moved-to-header');
                document.getElementById('top-bar').classList.add('visible');
            }, 3000);

            setTimeout(() => document.getElementById('hero').classList.add('visible'), 5000);
            setTimeout(() => { document.body.style.overflow = "auto"; }, 7000);
        });

        // Stacking Cards Effect
        window.addEventListener('scroll', () => {
            document.querySelectorAll('section').forEach((section) => {
                const rect = section.getBoundingClientRect();
                const img = section.querySelector('.bg-img');
                if (img) {
                    if (rect.top <= 0 && rect.bottom > 100) {
                        img.classList.add('shrink');
                    } else {
                        img.classList.remove('shrink');
                    }
                }
            });
        });
    </script>
</body>
</html>
